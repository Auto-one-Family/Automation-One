# Promtail Configuration for AutomationOne
# ==========================================
# Collects Docker container logs and ships them to Loki.
# Uses Docker service discovery to automatically find containers.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail-positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=auto-one"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{compose_service="el-servador"}'
          stages:
            - drop:
                source: ""
                expression: ".*GET /api/v1/health/.* HTTP/.*"
