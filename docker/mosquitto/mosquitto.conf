# ============================================
# Mosquitto Configuration for Docker Development
# ============================================
# Used by: docker-compose.yml
# Purpose: MQTT + WebSocket for AutomationOne development
#
# Security Note: This config is for DEVELOPMENT ONLY!
# For production, enable authentication and TLS.

# ============================================
# Listener: MQTT (Port 1883)
# ============================================
listener 1883
protocol mqtt

# ============================================
# Listener: WebSocket (Port 9001)
# ============================================
listener 9001
protocol websockets

# ============================================
# Authentication (Development: Anonymous)
# ============================================
# WARNING: Only for development! Enable auth in production.
allow_anonymous true

# For production, uncomment and configure:
# allow_anonymous false
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl

# ============================================
# Persistence
# ============================================
persistence true
persistence_location /mosquitto/data/

# ============================================
# Logging
# ============================================
# Primärer Log-Weg: stdout → Docker json-file → Promtail → Loki
# Docker json-file rotiert automatisch (max-size: 10m, max-file: 3)
# Für temporäres File-Logging: log_dest file /mosquitto/log/mosquitto.log aktivieren
log_dest stdout
# log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_type subscribe
log_type unsubscribe
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%SZ

# Connection events for debugging
connection_messages true

# ============================================
# Connection Settings
# ============================================
# INC-2026-04-11-ea5484-mqtt-transport-keepalive (PKG-19):
# ESP32 keepalive = 60 s; cap at 300 s to bound stale-connection detection
# for any client (debug tools, test scripts). Previously 65535 (unbounded).
max_keepalive 300

# Max connections (-1 = unlimited)
max_connections -1

# Reduce inflight to limit concurrent QoS 1/2 delivery pressure on
# resource-constrained ESP32 clients during reconnect bursts.
max_inflight_messages 10

# Both ESP32 and server use clean_session=true, so offline queuing rarely
# applies. Lowered from 1000 as defense-in-depth.
max_queued_messages 100

# Message size limit (256KB)
message_size_limit 262144

# ============================================
# Persistence Tuning
# ============================================
# Explicit save interval (seconds) so broker state survives restarts
# with bounded data loss. Default would be 1800.
autosave_interval 300
