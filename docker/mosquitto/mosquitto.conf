# ============================================
# Mosquitto Configuration for Docker Development
# ============================================
# Used by: docker-compose.yml
# Purpose: MQTT + WebSocket for AutomationOne development
#
# Security Note: This config is for DEVELOPMENT ONLY!
# For production, enable authentication and TLS.

# ============================================
# Listener: MQTT (Port 1883)
# ============================================
listener 1883
protocol mqtt

# ============================================
# Listener: WebSocket (Port 9001)
# ============================================
listener 9001
protocol websockets

# ============================================
# Authentication (Development: Anonymous)
# ============================================
# WARNING: Only for development! Enable auth in production.
allow_anonymous true

# For production, uncomment and configure:
# allow_anonymous false
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl

# ============================================
# Persistence
# ============================================
persistence true
persistence_location /mosquitto/data/

# ============================================
# Logging
# ============================================
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection events for debugging
connection_messages true

# ============================================
# Connection Settings
# ============================================
# Max keepalive (0 = unlimited)
max_keepalive 65535

# Max connections (-1 = unlimited)
max_connections -1

# Max inflight messages
max_inflight_messages 20

# Max queued messages
max_queued_messages 1000

# Message size limit (256KB)
message_size_limit 262144
