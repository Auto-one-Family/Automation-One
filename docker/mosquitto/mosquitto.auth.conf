# ============================================
# Mosquitto Configuration — AUTH ENABLED (PREPARED, NOT ACTIVE)
# ============================================
# Activate after ESP firmware supports MQTT credentials:
#   cp mosquitto.conf.bak.2026-05-26 mosquitto.conf.rollback
#   cp mosquitto.auth.conf mosquitto.conf
#   docker compose restart mqtt-broker
#
# Until then, active config remains mosquitto.conf with allow_anonymous true.

# ============================================
# Listener: MQTT (Port 1883)
# ============================================
listener 1883
protocol mqtt

# ============================================
# Listener: WebSocket (Port 9001)
# ============================================
listener 9001
protocol websockets

# ============================================
# Authentication (Production)
# ============================================
allow_anonymous false
password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl.conf

# ============================================
# Persistence
# ============================================
persistence true
persistence_location /mosquitto/data/

# ============================================
# Logging
# ============================================
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type subscribe
log_type unsubscribe
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%SZ

connection_messages true

# ============================================
# Connection Settings
# ============================================
max_keepalive 300
max_connections -1
max_inflight_messages 10
max_queued_messages 100
max_packet_size 262144
autosave_interval 300
