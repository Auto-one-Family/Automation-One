; AutomationOne Grafana Configuration
; ====================================
; This file supplements the GF_* environment variables from docker-compose.yml.
; Environment variables take precedence over ini values for the same key.
; Only settings NOT covered by env vars are placed here.

[log]
; Suppress "Failed to authenticate request" WARN from the internal
; alerting service-account. File-provisioned alerting uses an internal
; evaluator without a user token — this is expected behavior in Grafana 11.x.
; Level filter: show only ERROR+ for the authn.service logger.
filters = authn.service:error

[unified_alerting]
; Evaluation runs are already provisioned via file.
; Disable the Ruler API to prevent "GetRuleGroup unsupported in rule local store"
; errors when dashboard panels or API clients try to use it.
enabled = true

[alerting]
; Legacy alerting is disabled (Grafana 11 default)
enabled = false
