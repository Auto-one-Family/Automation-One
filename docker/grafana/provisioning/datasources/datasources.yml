apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    editable: false
    jsonData:
      # Disable Ruler API calls — we use Grafana file-provisioned alerting,
      # NOT Loki's built-in ruler. Without this, Grafana tries to call
      # /api/ruler/loki/api/v1/rules/* which fails with
      # "GetRuleGroup unsupported in rule local store"
      manageAlerts: false
