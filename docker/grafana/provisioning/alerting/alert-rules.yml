              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "MQTT-Broker hat keine verbundenen Clients"
          description: "broker_clients_connected == 0 seit >2m. Kein ESP32 oder Server verbunden. MQTT-Broker, Netzwerk pruefen."
        labels:
          severity: critical
          component: mqtt

      # Rule 28: MQTT Broker Messages Stored High
      # Fires when broker has >5000 retained/stored messages
