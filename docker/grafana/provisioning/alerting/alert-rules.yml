            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [5000]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "MQTT-Broker hat >5000 gespeicherte Nachrichten"
          description: "broker_messages_stored > 5000 seit >5m. Moeglicherweise Retained-Messages-Backlog oder Subscriber-Ausfaelle. Broker-State pruefen."
        labels:
          severity: warning
          component: mqtt

