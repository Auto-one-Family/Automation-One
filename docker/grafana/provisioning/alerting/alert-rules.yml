  - orgId: 1
    name: automationone-mqtt-broker-alerts
    folder: AutomationOne Alerts
    interval: 30s
    rules:
      # Rule 27: MQTT Broker No Clients
      # Fires when broker has 0 connected clients for >2m
      # Indicates all ESPs and server have lost MQTT connectivity
      - uid: ao-mqtt-broker-no-clients
        title: "MQTT Broker No Clients"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: prometheus
            model:
              expr: "broker_clients_connected{job=\"mqtt-broker\"}"
