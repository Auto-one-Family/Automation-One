# Grafana Alerting Provisioning - AutomationOne
# Phase 2: Expanded Alerting (UI-only, no webhook yet)
#
# Rules:
# - 5 Critical: server-down, mqtt-disconnected, database-down, loki-down, promtail-down
# - 3 Warning: high-memory, esp-devices-offline, high-error-rate
#
# Pipeline per rule: A (PromQL query) -> B (Reduce to last value) -> C (Threshold)
# All datasource UIDs verified against datasources.yml (2026-02-09)
# Evaluation intervals must be multiples of 10s (Grafana scheduler interval)

apiVersion: 1

groups:
  # ============================================
  # Critical Alerts (10s evaluation)
  # ============================================
  - orgId: 1
    name: automationone-critical
    folder: AutomationOne Alerts
    interval: 10s
    rules:
      # Rule 1: Server Down
      # Fires when Prometheus cannot scrape el-servador metrics endpoint
      - uid: ao-server-down
        title: "Server Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "up{job=\"el-servador\"}"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "God-Kaiser Server ist nicht erreichbar"
          description: "Prometheus kann /api/v1/health/metrics nicht scrapen seit >1m"
        labels:
          severity: critical
          component: server

      # Rule 2: MQTT Disconnected
      # Fires when god_kaiser_mqtt_connected gauge drops to 0
      - uid: ao-mqtt-disconnected
        title: "MQTT Disconnected"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "god_kaiser_mqtt_connected"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "MQTT-Broker Verbindung verloren"
          description: "god_kaiser_mqtt_connected == 0 seit >1m. Kein ESP32-Datenempfang moeglich."
        labels:
          severity: critical
          component: mqtt

      # Rule 3: Database Down
      # Fires when postgres-exporter reports pg_up == 0
      - uid: ao-database-down
        title: "Database Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "pg_up"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "PostgreSQL nicht erreichbar"
          description: "postgres-exporter meldet pg_up == 0 seit >1m"
        labels:
          severity: critical
          component: database

      # Rule 6: Loki Down
      # Fires when Prometheus cannot scrape Loki metrics endpoint
      - uid: ao-loki-down
        title: "Loki Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "up{job=\"loki\"}"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Loki Log-Aggregation nicht erreichbar"
          description: "Prometheus kann Loki :3100/metrics nicht scrapen seit >2m. Log-Ingestion gestoppt."
        labels:
          severity: critical
          component: monitoring

      # Rule 7: Promtail Down
      # Fires when Prometheus cannot scrape Promtail metrics endpoint
      - uid: ao-promtail-down
        title: "Promtail Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "up{job=\"promtail\"}"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Promtail Log-Shipping nicht erreichbar"
          description: "Prometheus kann Promtail :9080/metrics nicht scrapen seit >2m. Container-Logs werden nicht nach Loki geschickt."
        labels:
          severity: critical
          component: monitoring

  # ============================================
  # Warning Alerts (1m evaluation)
  # ============================================
  - orgId: 1
    name: automationone-warnings
    folder: AutomationOne Alerts
    interval: 1m
    rules:
      # Rule 4: High Memory Usage
      # Fires when server memory exceeds 85% for >5m
      # Server health reports "degraded" at 90%
      - uid: ao-high-memory
        title: "High Memory Usage"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "god_kaiser_memory_percent"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [85]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Server Memory ueber 85%"
          description: "god_kaiser_memory_percent > 85 seit >5m. Bei 90% wird Health-Status 'degraded'."
        labels:
          severity: warning
          component: server

      # Rule 5: ESP Devices Offline
      # Fires when >50% of registered ESP devices are offline for >3m
      # Guards: clamp_min prevents division-by-zero, esp_online > 0 ensures real devices exist
      # Development note: 100 mock ESPs with ~32% offline will NOT trigger this rule
      - uid: ao-esp-offline
        title: "ESP Devices Offline"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: prometheus
            model:
              expr: "(god_kaiser_esp_offline / clamp_min(god_kaiser_esp_total, 1)) > 0.5 and god_kaiser_esp_online > 0"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "ESP32-Geraete offline"
          description: "Mehr als 50% der registrierten ESP32-Geraete sind seit >3m offline. Guard: Mindestens ein Geraet muss online sein (verhindert False-Positives bei reinen Mock-Daten). Pruefen: Netzwerk, MQTT-Broker, ESP-Firmware."
        labels:
          severity: warning
          component: esp32

      # Rule 8: High MQTT Error Rate
      # Fires when MQTT receive/publish errors exceed 10 in the last 5 minutes
      - uid: ao-high-mqtt-error-rate
        title: "High MQTT Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "increase(god_kaiser_mqtt_errors_total[5m])"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Erhoehte MQTT-Fehlerrate"
          description: "Mehr als 10 MQTT-Fehler (receive/publish) in den letzten 5 Minuten. Pruefen: Broker-Verbindung, Payload-Validierung, Handler-Exceptions."
        labels:
          severity: warning
          component: mqtt

  # ============================================
  # Infrastructure Alerts (1m evaluation)
  # Phase 0: Alerts with existing metrics
  # ============================================
  - orgId: 1
    name: automationone-infrastructure
    folder: AutomationOne Alerts
    interval: 1m
    rules:
      # Rule 9: DB Query Slow
      # Fires when P95 DB query duration exceeds 1 second
      - uid: ao-db-query-slow
        title: "DB Query Slow"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "histogram_quantile(0.95, rate(god_kaiser_db_query_duration_seconds_bucket[5m]))"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Datenbank-Queries langsam"
          description: "P95 DB Query Duration > 1s seit >5m. Pruefen: Query-Optimierung, Indexe, Connection-Pool."
        labels:
          severity: warning
          component: database

      # Rule 10: DB Connections High
      # Fires when PostgreSQL active connections exceed 80
      - uid: ao-db-connections-high
        title: "DB Connections High"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: prometheus
            model:
              expr: "pg_stat_database_numbackends{datname=\"god_kaiser_db\"}"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "PostgreSQL Verbindungen hoch"
          description: "Mehr als 80 aktive DB-Verbindungen seit >3m. Pruefen: Connection-Pool, offene Transaktionen, Connection-Leaks."
        labels:
          severity: warning
          component: database

      # Rule 11: cAdvisor Down
      # Fires when Prometheus cannot scrape cAdvisor metrics
      - uid: ao-cadvisor-down
        title: "cAdvisor Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: "up{job=\"cadvisor\"}"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "cAdvisor Container-Monitoring nicht erreichbar"
          description: "Prometheus kann cAdvisor :8080/metrics nicht scrapen seit >2m. Container-Metriken nicht verfuegbar."
        labels:
          severity: critical
          component: monitoring

  # ============================================
  # Sensor Alerts (30s evaluation)
  # Phase 0 Phase C: Alerts requiring new metrics from metrics.py
  # ============================================
  - orgId: 1
    name: automationone-sensor-alerts
    folder: AutomationOne Alerts
    interval: 30s
    rules:
      # Rule 12: Temperature Out of Range
      - uid: ao-sensor-temp-range
        title: "Temp Out of Range"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: "god_kaiser_sensor_value{sensor_type=\"temperature\"} > 85 or god_kaiser_sensor_value{sensor_type=\"temperature\"} < -40"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Temperaturwert ausserhalb Messbereich"
          description: "DS18B20 Messbereich: -40 bis 85°C. Sensor pruefen, Verkabelung kontrollieren."
        labels:
          severity: warning
          component: sensor

      # Rule 13: pH Out of Range
      - uid: ao-sensor-ph-range
        title: "pH Out of Range"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: "god_kaiser_sensor_value{sensor_type=\"ph\"} > 14 or god_kaiser_sensor_value{sensor_type=\"ph\"} < 0"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "pH-Wert ausserhalb physikalischer Grenzen"
          description: "pH-Skala: 0.0 bis 14.0. Sensor kalibrieren oder Sonde pruefen."
        labels:
          severity: critical
          component: sensor

      # Rule 14: Humidity Out of Range
      - uid: ao-sensor-humidity-range
        title: "Humidity Out of Range"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: "god_kaiser_sensor_value{sensor_type=\"humidity\"} > 100 or god_kaiser_sensor_value{sensor_type=\"humidity\"} < 0"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Luftfeuchtigkeit ausserhalb Grenzen"
          description: "Physikalische Grenze: 0-100%. Sensor pruefen."
        labels:
          severity: warning
          component: sensor

      # Rule 15: EC Out of Range
      - uid: ao-sensor-ec-range
        title: "EC Out of Range"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: "god_kaiser_sensor_value{sensor_type=\"ec\"} > 10000"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "EC-Wert ausserhalb Messbereich"
          description: "EC > 10000 uS/cm. Sensor pruefen, Kalibrierung kontrollieren."
        labels:
          severity: warning
          component: sensor

      # Rule 16: Sensor Data Stale
      - uid: ao-sensor-stale
        title: "Sensor Data Stale"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: "time() - god_kaiser_sensor_last_update > 300"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Sensordaten veraltet"
          description: "Kein Sensor-Update seit >5 Minuten. ESP32-Verbindung, MQTT-Handler oder Sensor pruefen."
        labels:
          severity: warning
          component: sensor

  # ============================================
  # Device Alerts (30s evaluation)
  # ============================================
  - orgId: 1
    name: automationone-device-alerts
    folder: AutomationOne Alerts
    interval: 30s
    rules:
      # Rule 17: Heartbeat Gap
      - uid: ao-heartbeat-gap
        title: "Heartbeat Gap"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "time() - god_kaiser_esp_last_heartbeat > 120"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "ESP32 Heartbeat-Luecke"
          description: "Kein Heartbeat seit >2 Minuten. ESP32-Verbindung, WiFi, MQTT pruefen."
        labels:
          severity: warning
          component: esp32

      # Rule 18: ESP Boot Loop
      - uid: ao-esp-boot-loop
        title: "ESP Boot Loop"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: "increase(god_kaiser_esp_boot_count[10m]) > 3"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "ESP32 Boot-Loop erkannt"
          description: "Mehr als 3 Neustarts in 10 Minuten. Firmware, Watchdog, Stromversorgung pruefen."
        labels:
          severity: critical
          component: esp32

      # Rule 19: Error Cascade
      - uid: ao-esp-error-cascade
        title: "Error Cascade"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
