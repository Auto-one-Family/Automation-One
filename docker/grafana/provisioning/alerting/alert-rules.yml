      # Rule 34: Email Failure Rate
      # Fires when email delivery failure rate exceeds 50% in 15m
      - uid: ao-email-failure-rate
        title: "Email Failure Rate High"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'rate(god_kaiser_email_sent_total{status="failure"}[15m])'
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
