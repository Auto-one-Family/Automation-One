              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Email delivery failure rate >50% in 15m"
          description: "Email delivery is failing frequently. Check Resend API key, SMTP credentials, and network connectivity."
        labels:
          severity: critical
          component: notifications

      # Rule 35: Webhook Reception Stopped
      # Fires when no Grafana webhooks received for 1 hour
      - uid: ao-webhook-reception-stopped
        title: "Webhook Reception Stopped"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: "increase(god_kaiser_webhook_received_total[1h])"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 15m
        annotations:
          summary: "No Grafana webhooks received for >1 hour"
          description: "Grafana webhook reception has stopped. Check Grafana alerting contact point configuration and server connectivity."
        labels:
          severity: warning
          component: notifications

      # Rule 36: High Suppression Ratio
      # Fires when >80% of notifications are suppressed
      - uid: ao-high-suppression-ratio
        title: "High Suppression Ratio"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: "sum(increase(god_kaiser_notifications_suppressed_total[1h])) / (sum(increase(god_kaiser_notifications_total[1h])) + sum(increase(god_kaiser_notifications_suppressed_total[1h])) + 0.001)"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: gt
                    params: [0.8]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 30m
        annotations:
          summary: "Suppression ratio >80% in last hour"
          description: "More than 80% of notifications are being suppressed. Review suppression rules — some may be overly broad."
        labels:
          severity: info
          component: notifications

      # Rule 37: Digest Backlog
      # Fires when no digests processed for >2 hours (stale scheduler)
      - uid: ao-digest-backlog
        title: "Digest Processing Stale"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: prometheus
            model:
              expr: "increase(god_kaiser_digest_processed_total[2h])"
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: reduce
              expression: "A"
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: '__expr__'
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Alerting
        for: 30m
        annotations:
          summary: "No digest emails processed for >2 hours"
          description: "Digest scheduler may be stale. Check CentralScheduler status and digest service health."
        labels:
          severity: warning
          component: notifications

# Remove legacy Promtail rule (migrated to Alloy 2026-02-24)
deleteRules:
  - orgId: 1
    uid: ao-promtail-down
