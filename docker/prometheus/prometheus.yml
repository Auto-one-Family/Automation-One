global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'el-servador'
    metrics_path: '/api/v1/health/metrics'
    static_configs:
      - targets: ['el-servador:8000']
        labels:
          service: 'el-servador'
          environment: 'development'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
