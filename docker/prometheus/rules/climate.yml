groups:
  - name: automationone-rule-skip
    interval: 1m
    rules:
      - alert: CriticalRuleSkippedDueToTargetOffline
        expr: increase(god_kaiser_rule_skip_target_offline_total[10m]) > 5
        for: 10m
        labels:
          severity: critical
          category: connectivity
        annotations:
          summary: "Regel {{ $labels.rule_id }} skippt seit >10 min (Ziel {{ $labels.esp_id }} offline)"
