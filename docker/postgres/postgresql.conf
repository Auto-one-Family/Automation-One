# PostgreSQL Custom Configuration for AutomationOne
# ================================================
# Mounted as /etc/postgresql/postgresql.conf in container

# ========== CONNECTION ==========
listen_addresses = '*'

# ========== LOGGING ==========
# logging_collector = off: Logs go to stderr -> Docker captures -> Alloy -> Loki
# This replaces file-based logging for container environments.
# Docker handles rotation via max-size/max-file in docker-compose.yml.
logging_collector = off
log_destination = 'stderr'

# ========== WHAT TO LOG ==========
# 'mod' = INSERT/UPDATE/DELETE/DDL only (not every SELECT)
log_statement = 'mod'
# Log SELECT statements that take >100ms (slow query detection)
log_min_duration_statement = 100
log_duration = off
log_connections = on
log_disconnections = on
log_lock_waits = on

# ========== FORMAT ==========
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# ========== ROTATION ==========
# File-based rotation disabled (logging_collector = off).
# Docker handles log rotation via max-size/max-file driver options.
