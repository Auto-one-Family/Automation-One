# PostgreSQL Custom Configuration for AutomationOne
# ================================================
# Mounted as /etc/postgresql/postgresql.conf in container

# ========== CONNECTION ==========
listen_addresses = '*'

# ========== LOGGING ==========
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql.log'
log_file_mode = 0644

# ========== WHAT TO LOG ==========
# 'mod' = INSERT/UPDATE/DELETE/DDL only (not every SELECT)
log_statement = 'mod'
# Log SELECT statements that take >100ms (slow query detection)
log_min_duration_statement = 100
log_duration = off
log_connections = on
log_disconnections = on
log_lock_waits = on

# ========== FORMAT ==========
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# ========== ROTATION ==========
# Rotate daily OR at 50MB, whichever comes first
log_rotation_age = 1d
log_rotation_size = 50MB
log_truncate_on_rotation = off
