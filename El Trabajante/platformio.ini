[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Xiao-optimierte Build-Flags
build_flags = 
    ; Debug & Logging (reduziert für Speicher)
    -DCORE_DEBUG_LEVEL=2
    ; Disable ANSI color codes (causes issues in most Serial Monitors)
    -DCONFIG_ARDUHAL_LOG_COLORS=0
    
    ; KERNEL-FEATURES BEIBEHALTEN
    -DDYNAMIC_LIBRARY_SUPPORT=1
    -DHIERARCHICAL_ZONES=1
    -DOTA_LIBRARY_ENABLED=1
    -DSAFE_MODE_PROTECTION=1
    -DZONE_MASTER_ENABLED=1
    
    ; THREAD-SAFETY (Phase 6+) - Aktiviert Mutex-Schutz in StorageManager
    -DCONFIG_ENABLE_THREAD_SAFETY
    
    ; SAFETY-RTOS M5.1: Xiao/Wokwi nutzen PubSubClient (kein ESP-IDF MQTT)
    -DMQTT_USE_PUBSUBCLIENT=1
    ; Xiao-spezifische Anpassungen
    -DXIAO_ESP32C3_MODE=1
    -DMAX_SENSORS=10
    -DMAX_ACTUATORS=6
    -DMAX_LIBRARY_SIZE=32768
    -DMQTT_MAX_PACKET_SIZE=1024
    -DMQTT_KEEPALIVE=60
    -DMQTT_SOCKET_TIMEOUT=60
    -DWIFI_CONNECT_TIMEOUT=10000
    -DCONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=8
    '-DKAISER_FIRMWARE_VERSION_STRING="4.0.0"'

; Partitionierung für Xiao
board_build.partitions = default.csv
board_build.filesystem = spiffs

; Libraries (nur Basis-Libraries)
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3
    arduino-libraries/NTPClient@^3.2.1
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.11.0
    WebServer
    DNSServer

monitor_filters =
    esp32_exception_decoder
    time
    ; colorize removed - causes ANSI escape code issues in Serial Monitor
    ; debug removed - causes fragmented [RX:'...'] output that's hard to read
    log2file
    default
    send_on_enter

; =============================================================================
; ESP32 DEV ENVIRONMENT - Entwicklungs-Board
; =============================================================================

[env:esp32_dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_upload.offset_address = 0x20000

; ESP32 Dev Build-Flags
build_flags = 
    ; Debug & Logging (INFO-Level fuer ESP32 Dev, war 3=VERBOSE — spart ~21KB Flash)
    -DCORE_DEBUG_LEVEL=2
    ; Disable ANSI color codes (causes issues in most Serial Monitors)
    -DCONFIG_ARDUHAL_LOG_COLORS=0
    
    ; KERNEL-FEATURES BEIBEHALTEN
    -DDYNAMIC_LIBRARY_SUPPORT=1
    -DHIERARCHICAL_ZONES=1
    -DOTA_LIBRARY_ENABLED=1
    -DSAFE_MODE_PROTECTION=1
    -DZONE_MASTER_ENABLED=1
    
    ; THREAD-SAFETY (Phase 6+) - Aktiviert Mutex-Schutz in StorageManager
    -DCONFIG_ENABLE_THREAD_SAFETY

    ; SAFETY-RTOS M5.1: ESP-IDF MQTT ist jetzt der Default (kein Flag noetig).
    ; PubSubClient-Pfad erfordert explizit -DMQTT_USE_PUBSUBCLIENT=1 (seeed/wokwi).
    ; NOTE: Core-Pinning fuer MQTT-Task (Core 0) via sdkconfig — nicht via -D,
    ;       da CONFIG_MQTT_TASK_CORE_SELECTION_ENABLED ein Kconfig-Flag ist und
    ;       -D-Ueberschreibung mit sdkconfig.h Konflikte erzeugt.

    ; ESP32 Dev-spezifische Anpassungen
    -DESP32_DEV_MODE=1
    -DMAX_SENSORS=20
    -DMAX_ACTUATORS=12
    -DMAX_LIBRARY_SIZE=65536
    -DMQTT_MAX_PACKET_SIZE=2048
    -DMQTT_KEEPALIVE=60
    -DMQTT_SOCKET_TIMEOUT=60
    -DWIFI_CONNECT_TIMEOUT=10000
    ; WiFi RX buffer count: set via sdkconfig (Arduino-ESP32). Do not -D here — conflicts with sdkconfig.h and spams redefinition warnings.
    ; Firmware version (Provisioning, /status) — override: '-DKAISER_FIRMWARE_VERSION_STRING="x.y.z"'
    '-DKAISER_FIRMWARE_VERSION_STRING="4.0.0"'

; Partitionierung für ESP32 Dev (Custom: 1.5MB app slots, 32KB NVS)
board_build.partitions = partitions_custom.csv
board_build.filesystem = spiffs
; SAFETY-RTOS M2: MQTT-Task auf Core 0 pinnen (siehe sdkconfig.defaults)
board_build.sdkconfig_defaults = sdkconfig.defaults

; Libraries (erweiterte Auswahl für ESP32 Dev)
lib_deps =
    bblanchon/ArduinoJson@^6.21.3
    arduino-libraries/NTPClient@^3.2.1
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.11.0
    WebServer
    DNSServer
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/Adafruit BME280 Library@^2.2.2
    throwtheswitch/Unity@^2.6.0

monitor_filters =
    esp32_exception_decoder
    time
    ; colorize removed - causes ANSI escape code issues in Serial Monitor
    ; debug removed - causes fragmented [RX:'...'] output that's hard to read
    log2file
    default
    send_on_enter

; =============================================================================
; WOKWI SIMULATION ENVIRONMENT
; =============================================================================
; Purpose: Test real ESP32 firmware in Wokwi virtual environment
;
; Usage:
;   Build:   pio run -e wokwi_simulation
;   Run:     wokwi-cli . --timeout 60000
;   CI:      wokwi-cli . --scenario tests/wokwi/scenarios/01-boot/boot_full.yaml
;
; Documentation: https://docs.wokwi.com/

[env:wokwi_simulation]
extends = env:esp32_dev
build_flags =
    ${env:esp32_dev.build_flags}
    ; Wokwi Simulation Mode
    -D WOKWI_SIMULATION=1
    ; Disable ANSI color codes for Wokwi (Serial Monitor doesn't support them)
    -DCONFIG_ARDUHAL_LOG_COLORS=0
    ; WiFi credentials for Wokwi (Wokwi-GUEST is open network)
    -D WOKWI_WIFI_SSID=\"Wokwi-GUEST\"
    -D WOKWI_WIFI_PASSWORD=\"\"
    ; MQTT broker via Wokwi Gateway (routes to localhost or CI service)
    ; Use host.wokwi.internal - Wokwi's special hostname for host machine
    ; Falls back to actual Windows IP if this doesn't work
    -D WOKWI_MQTT_HOST=\"host.wokwi.internal\"
    -D WOKWI_MQTT_PORT=1883
    ; Optional: Pre-configured ESP ID for reproducible tests
    ; Format must match server pattern: ESP_[A-F0-9]{8}
    -D WOKWI_ESP_ID=\"ESP_00000001\"
    ; Wokwi uses PubSubClient (Arduino), not ESP-IDF MQTT (no FreeRTOS task support in sim)
    -DMQTT_USE_PUBSUBCLIENT=1

; PubSubClient required for MQTT_USE_PUBSUBCLIENT=1 (not in esp32_dev lib_deps)
lib_deps =
    ${env:esp32_dev.lib_deps}
    knolleary/PubSubClient@^2.8

; Disable colorize filter for Wokwi (causes ANSI escape code issues)
; debug removed - causes fragmented [RX:'...'] output that's hard to read
monitor_filters =
    esp32_exception_decoder
    time
    log2file
    default
    send_on_enter

; =============================================================================
; WOKWI MULTI-DEVICE ENVIRONMENTS - For Parallel Testing
; =============================================================================
; Purpose: Multiple Wokwi ESPs with different IDs for multi-device scenarios
;
; Usage:
;   Build:   pio run -e wokwi_esp01|wokwi_esp02|wokwi_esp03
;   Run:     wokwi-cli . --timeout 0 --firmware .pio/build/wokwi_esp01/firmware.bin
;   CI:      Parallel test execution with different device IDs
;
; Note: Each environment uses same codebase, only ESP ID differs

[env:wokwi_esp01]
extends = env:wokwi_simulation
build_flags =
    ${env:wokwi_simulation.build_flags}
    -D WOKWI_ESP_ID=\"ESP_00000001\"

[env:wokwi_esp02]
extends = env:wokwi_simulation
build_flags =
    ${env:wokwi_simulation.build_flags}
    -D WOKWI_ESP_ID=\"ESP_00000002\"

[env:wokwi_esp03]
extends = env:wokwi_simulation
build_flags =
    ${env:wokwi_simulation.build_flags}
    -D WOKWI_ESP_ID=\"ESP_00000003\"

; =============================================================================
; NATIVE TEST ENVIRONMENT - x86_64 Host (KEINE Hardware)
; =============================================================================
; Purpose: Unit tests für Pure-Logic-Module ohne Hardware-Dependencies
;
; Usage:
;   pio test -e native                    # Alle nativen Tests
;   pio test -e native -f test_topic_*    # Nur TopicBuilder
;   pio test -e native -v                 # Verbose
;
; Known Issues:
;   - Historische PlatformIO Linker-Probleme (dokumentiert in TEST_WORKFLOW.md)
;   - Git Bash hat Probleme mit pio test - verwende PowerShell oder CMD
;   - Native: gcc/g++ erforderlich (PATH oder MinGW-Pfade in scripts/set_native_toolchain.py)

[env:native]
platform = native
extra_scripts = pre:scripts/set_native_toolchain.py
build_flags =
    -std=c++17
    ; Test-Mode aktivieren
    -DNATIVE_TEST=1
    -DUNIT_TEST=1

    ; Disable Hardware
    -DESP_PLATFORM=0
    -DARDUINO=0

    ; Mock-Konfiguration
    -DMOCK_ARDUINO=1

    ; Konstanten für Tests
    -DMAX_SENSORS=20
    -DMAX_ACTUATORS=12
    -DMQTT_MAX_PACKET_SIZE=2048

    ; Include-Paths
    -I src/
    -I test/mocks/

; Test-Konfiguration
test_framework = unity
test_build_src = yes
build_src_filter =
    -<*>
    +<utils/topic_builder.cpp>
    +<drivers/gpio_manager.cpp>
    +<utils/logger.cpp>
test_ignore =
    esp32_hardware              ; Hardware-Tests überspringen
    integration
    _archive
    helpers
    mocks

; =============================================================================
; ESP32 HARDWARE TEST ENVIRONMENT - Unity auf ESP32 (optional)
; =============================================================================
; Purpose: Hardware-nahe Tests direkt auf ESP32 ausführen
;
; Usage:
;   pio test -e esp32dev_test -t upload    # Upload und run auf Hardware

[env:esp32dev_test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
    ${env:esp32_dev.build_flags}
    -DUNIT_TEST=1
    -DESP32_HARDWARE_TEST=1

test_framework = unity
test_build_src = yes
test_ignore =
    unit/native_only
    _archive

lib_deps =
    ${env:esp32_dev.lib_deps}

; =============================================================================
; TEST ENVIRONMENT
; =============================================================================
; HINWEIS: Test-Kategorisierung erfolgt über PowerShell-Script, nicht über
; separate Environments. Siehe .claude/commands/esp-test-category.md
;
; Usage:
;   /esp-test-category infra        # Nur Infrastructure-Tests
;   /esp-test-category actuator     # Nur Actuator-Tests
;   /esp-test-category sensor       # Nur Sensor-Tests
;   /esp-test-category comm         # Nur Communication-Tests
;   /esp-test-category integration  # Nur Integration-Tests
;   /esp-test-category all          # Alle Kategorien sequentiell
;
; Das Script managed dynamisch welche Test-Dateien im test/ Ordner sind,
; um PlatformIO's Multiple-Definition-Problem zu umgehen.

