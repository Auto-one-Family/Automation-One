# HW-PWM-001 to HW-PWM-005: PWM Configuration
# ============================================
# Validates PWM configuration is correctly applied to actuators.
#
# Test IDs: HW-PWM-001, HW-PWM-003, HW-PWM-004, HW-PWM-005
# Priority: MEDIUM
# Requirement:
#   - PWM channels are available (WROOM: 16, XIAO: 6)
#   - PWM resolution is 12-bit (0-4095)
#   - PWM frequency is 1000 Hz
#   - PWM actuators respond to commands
#
# PWM Configuration:
#   ESP32-WROOM-32: PWM_CHANNELS=16, PWM_RESOLUTION=12, PWM_FREQUENCY=1000
#   XIAO ESP32-C3:  PWM_CHANNELS=6,  PWM_RESOLUTION=12, PWM_FREQUENCY=1000
#
# MQTT-Injection (extern via CI):
#   Step 1 - Configure PWM actuator (LED):
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
#       -m '{"actuators":[{"gpio":5,"actuator_type":"led","actuator_name":"PWM_LED","active":true,"pwm_enabled":true}]}'
#   Step 2 - PWM 50% duty cycle (after ~1.5s):
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/actuator/5/command" \
#       -m '{"command":"PWM","value":0.5}'
#   Step 3 - PWM 100% (after ~1s):
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/actuator/5/command" \
#       -m '{"command":"PWM","value":1.0}'
#   Step 4 - OFF (after ~1s):
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/actuator/5/command" \
#       -m '{"command":"OFF","value":0}'
#
# Firmware references:
#   - esp32_dev.h lines 84-86: PWM constants
#   - pwm_controller.cpp: PWM channel management
#   - actuator_manager.cpp: PWM actuator control

name: PWM Configuration Verification
version: 1
steps:
  # Wait for boot to complete
  - wait-serial: "Phase 1: Core Infrastructure READY"

  # Wait for MQTT connection
  - wait-serial: "MQTT connected successfully"

  # External MQTT injection: configure PWM-capable actuator (CI helper script)

  # Verify actuator is configured
  - wait-serial: "Actuator"

  # Wait for config to be applied
  - delay: 1500ms

  # External MQTT injection: send PWM command at 50% duty cycle (CI helper script)

  # Verify PWM command is processed
  - wait-serial: "PWM"

  # Wait for status update
  - delay: 1000ms

  # Verify actuator status is published
  - wait-serial: "actuator"

  # External MQTT injection: send PWM 100% command (CI helper script)

  # Verify command processed
  - wait-serial: "PWM"

  # External MQTT injection: send OFF command (CI helper script)

  # Verify OFF command processed
  - wait-serial: "OFF"
