# HW-LIM-004: Actuator Limit Enforcement
# =======================================
# Validates that MAX_ACTUATORS limit is enforced and additional
# actuators beyond the limit are rejected.
#
# Test ID: HW-LIM-004
# Priority: HIGH
# Requirement:
#   - ActuatorManager enforces MAX_ACTUATORS limit
#   - Additional actuators are rejected with appropriate error
#
# Resource Limits (from platformio.ini):
#   ESP32-WROOM-32 (wokwi_simulation): MAX_ACTUATORS=12
#   XIAO ESP32-C3:                     MAX_ACTUATORS=6
#
# Note: This test verifies the MECHANISM works, not the exact limit.
# We configure several actuators and verify the manager is tracking count.
#
# MQTT-Injection (extern via CI):
#   Step 1 - Configure first batch (4 actuators):
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
#       -m '{"actuators":[{"gpio":5,"actuator_type":"led","actuator_name":"LED1","active":true},{"gpio":14,"actuator_type":"relay","actuator_name":"Relay1","active":true},{"gpio":15,"actuator_type":"pump","actuator_name":"Pump1","active":true},{"gpio":16,"actuator_type":"relay","actuator_name":"Relay2","active":true}]}'
#   Step 2 - Configure second batch (4 more, after ~2s):
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
#       -m '{"actuators":[{"gpio":17,"actuator_type":"relay","actuator_name":"Relay3","active":true},{"gpio":18,"actuator_type":"led","actuator_name":"LED2","active":true},{"gpio":19,"actuator_type":"led","actuator_name":"LED3","active":true},{"gpio":23,"actuator_type":"relay","actuator_name":"Relay4","active":true}]}'
#
# Firmware references:
#   - platformio.ini: -DMAX_ACTUATORS=12 (esp32_dev)
#   - actuator_manager.cpp: Checks count before adding new actuator

name: Actuator Limit Enforcement
version: 1
steps:
  # Wait for boot to complete
  - wait-serial: "Phase 1: Core Infrastructure READY"

  # Wait for MQTT connection
  - wait-serial: "MQTT connected successfully"

  # External MQTT injection: configure first batch of actuators (CI helper script)

  # Verify actuators are being configured
  - wait-serial: "Actuator"

  # Wait for config processing
  - delay: 2000ms

  # Verify config response
  - wait-serial: "config_response"

  # External MQTT injection: configure second batch of actuators (CI helper script)

  # Wait for config processing
  - delay: 2000ms

  # Verify heartbeat shows actuator count
  # Heartbeat payload includes actuator_count field
  - wait-serial: "heartbeat"
