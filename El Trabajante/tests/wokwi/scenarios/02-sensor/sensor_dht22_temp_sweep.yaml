# DHT22 Temperature Sweep Test
# Validates DHT22 temperature reading across range via set-control
# Sweep: 0C -> 25C -> 50C
# DHT22 connected to GPIO 15 in diagram.json
# Timeout: 90000ms

name: DHT22 Temperature Sweep
version: 1
steps:
  # Boot and connect
  - wait-serial: "MQTT connected"

  # Registration gate
  - wait-serial: "REGISTRATION"

  # Wait for first measurement cycle
  - wait-serial: "Published"

  # --- Sweep: Cold (0C) ---
  - set-control:
      part-id: "dht22"
      control: "temperature"
      value: "0"
  - delay: 8000ms
  - wait-serial: "Published"

  # --- Sweep: Normal (25C) ---
  - set-control:
      part-id: "dht22"
      control: "temperature"
      value: "25"
  - delay: 8000ms
  - wait-serial: "Published"

  # --- Sweep: Hot (50C) ---
  - set-control:
      part-id: "dht22"
      control: "temperature"
      value: "50"
  - delay: 8000ms
  - wait-serial: "Published"
