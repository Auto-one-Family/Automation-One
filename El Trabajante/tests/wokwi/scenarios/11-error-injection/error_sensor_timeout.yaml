# Error Injection: Sensor Timeout
# ================================
# Configures a DS18B20 sensor on a GPIO with no physical device connected.
# The firmware should detect the timeout and report an error.
#
# MQTT Injection (external):
#   Topic: kaiser/god/esp/ESP_00000001/config
#   Payload: {"sensors":[{"gpio":32,"sensor_type":"ds18b20","sensor_name":"GhostSensor","active":true,"raw_mode":true}],"actuators":[]}
#
# Expected: Firmware detects no device on GPIO 32 and logs sensor error.
# Timeout: 90000ms

name: Error Injection - Sensor Timeout
version: 1
steps:
  # Wait for full boot and MQTT connection
  - wait-serial: "MQTT connected successfully"
  - wait-serial: "heartbeat"

  # After config injection, firmware should attempt to read
  # and report the sensor failure
  - wait-serial: "config"
  - delay: 15000
  - wait-serial: "error"
