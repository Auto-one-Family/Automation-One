# Error Injection: Invalid JSON Configuration
# =============================================
# Sends malformed JSON to the config topic. The firmware should
# detect the parse error and not crash.
#
# MQTT Injection (external):
#   Topic: kaiser/god/esp/ESP_00000001/config
#   Payload: {invalid json content here!!!
#
# Expected: Firmware logs JSON parse error and continues operating.
# Timeout: 90000ms

name: Error Injection - Invalid JSON Config
version: 1
steps:
  # Wait for full boot
  - wait-serial: "MQTT connected successfully"
  - wait-serial: "heartbeat"

  # After invalid JSON injection, firmware should log error but survive
  - delay: 30000

  # Verify system is still alive after bad config
  - wait-serial: "heartbeat"
