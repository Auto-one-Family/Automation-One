# Error Injection: Full Factory Reset Flow
# ==========================================
# Tests the complete factory reset flow: trigger via MQTT,
# NVS erase, and system restart confirmation.
#
# MQTT Injection (external):
#   Topic: kaiser/god/esp/ESP_00000001/system/command
#   Payload: {"command":"factory_reset","confirm":true}
#
# Expected: Factory reset initiated, NVS erased, system restarts.
# Timeout: 90000ms

name: Error Injection - Full Factory Reset
version: 1
steps:
  # Wait for system to be fully operational
  - wait-serial: "MQTT connected successfully"
  - wait-serial: "heartbeat"

  # After factory reset injection
  - wait-serial: "factory_reset"
