# Error Injection: MQTT Disconnect Recovery
# ==========================================
# ESP32 boots, connects to MQTT, then the broker becomes unavailable.
# This is a passive test — we just verify the ESP32 handles MQTT
# connection and reconnection gracefully.
#
# Note: In Wokwi simulation, we can't actually kill the broker.
# Instead we verify the MQTT connection handling is robust by
# watching for the initial connection and heartbeat sequence.
#
# Timeout: 90000ms

name: Error Injection - MQTT Disconnect Recovery
version: 1
steps:
  # Verify initial MQTT connection succeeds
  - wait-serial: "MQTT connected successfully"

  # Verify heartbeat loop is running (proves MQTT publish works)
  - wait-serial: "heartbeat"

  # Wait for a second heartbeat to prove sustained connection
  - wait-serial: "heartbeat"
