# GPIO-SAFE-001 & GPIO-SAFE-002: Single Pin Safe-Mode Control
# ============================================================
# Validates that:
# - enableSafeModeForPin(gpio) sets mode to INPUT_PULLUP
# - disableSafeModeForPin(gpio) clears the in_safe_mode flag
#
# Test IDs: GPIO-SAFE-001, GPIO-SAFE-002
# Priority: HIGH
# Requirement:
#   - enableSafeModeForPin(4) -> mode == INPUT_PULLUP, in_safe_mode == true
#   - disableSafeModeForPin(4) -> in_safe_mode == false
#
# Note: Single-pin safe mode is typically used during:
#   - Sensor/Actuator reconfiguration
#   - Error recovery for specific components
#   - Maintenance operations
#
# MQTT-Injection (extern via CI):
#   Step 1 - Configure actuator on GPIO 5:
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
#       -m '{"actuators":[{"gpio":5,"actuator_type":"pump","actuator_name":"TestPump","active":true}]}'
#   Step 2 - Turn actuator ON (after ~1s):
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/actuator/5/command" \
#       -m '{"command":"ON"}'
#   Step 3 - Trigger ESP-specific emergency stop:
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/actuator/emergency" \
#       -m '{"command":"STOP","reason":"Test safe mode"}'
#
# Firmware reference: gpio_manager.cpp (implicit in enableSafeModeForSubzone)

name: Single Pin Safe-Mode Enable and Disable
version: 1
steps:
  # Wait for boot to complete
  - wait-serial: "Phase 1: Core Infrastructure READY"

  # Wait for MQTT connection
  - wait-serial: "MQTT connected"

  # External MQTT injection: configure actuator on GPIO 5 (CI helper script)

  # Verify actuator is configured
  - wait-serial: "Pin 5 allocated"

  # Wait for actuator to be operational
  - delay: 1000ms

  # External MQTT injection: turn actuator ON (CI helper script)

  # Verify actuator is ON
  - wait-serial: "GPIO 5"

  # External MQTT injection: trigger ESP-specific emergency stop (CI helper script)

  # Verify safe mode is activated for actuator pin
  - wait-serial: "Emergency"

  # Verify pin returns to safe state
  - wait-serial: "safe"
