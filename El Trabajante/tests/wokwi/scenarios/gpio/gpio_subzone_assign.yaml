# GPIO-SUB-001 & GPIO-SUB-002: Subzone Pin Assignment and Removal
# ===============================================================
# Validates that:
# - assignPinToSubzone(gpio, subzone_id) assigns pin to subzone
# - removePinFromSubzone(gpio) removes pin from subzone
#
# Test IDs: GPIO-SUB-001, GPIO-SUB-002
# Priority: HIGH
# Requirement:
#   - assignPinToSubzone(4, "irrigation") returns true
#   - removePinFromSubzone(4) returns true
#
# Subzone Management (Phase 9):
#   - Pin-level isolation for zone grouping
#   - Emergency stop can target specific subzones
#   - Sensors and actuators can be grouped by subzone
#
# MQTT-Injection (extern via CI):
#   Step 1 - Configure sensor on GPIO 4:
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
#       -m '{"sensors":[{"gpio":4,"sensor_type":"temp_ds18b20","sensor_name":"IrrigationTemp","subzone":"irrigation_zone","active":true}]}'
#   Step 2 - Assign pins to subzone (after ~500ms):
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/subzone/assign" \
#       -m '{"subzone_id":"irrigation_zone","gpios":[4,5,14]}'
#   Step 3 - Remove pin from subzone (after ~500ms):
#     mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/subzone/remove" \
#       -m '{"subzone_id":"irrigation_zone","gpios":[4]}'
#
# Firmware reference: gpio_manager.cpp lines 479-564

name: Subzone Pin Assignment and Removal
version: 1
steps:
  # Wait for boot to complete
  - wait-serial: "Phase 1: Core Infrastructure READY"

  # Wait for MQTT connection
  - wait-serial: "MQTT connected"

  # External MQTT injection: configure sensor on GPIO 4 (CI helper script)

  # Verify sensor is configured
  - wait-serial: "Pin 4 allocated"

  # Wait for configuration
  - delay: 500ms

  # GPIO-SUB-001: External MQTT injection - assign pins to subzone (CI helper script)

  # Verify subzone assignment
  - wait-serial: "assigned to subzone"
  - wait-serial: "irrigation_zone"

  # Wait for assignment to complete
  - delay: 500ms

  # GPIO-SUB-002: External MQTT injection - remove pin from subzone (CI helper script)

  # Verify pin removal
  - wait-serial: "removed from subzone"
