# docker-compose.pi.yml — Raspberry Pi Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.pi.yml up -d postgres mqtt-broker ntp el-servador el-frontend

services:
  el-servador:
    environment:
      SERVER_RELOAD: "false"
      ENVIRONMENT: production
      LOG_LEVEL: WARNING
      CORS_ALLOWED_ORIGINS: '["http://AutoOne44.local:5173","http://192.168.0.2:5173","http://localhost:5173","http://AutoOne44.local:5174","http://192.168.0.2:5174","http://localhost:5174"]'
    volumes:
      # Remove dev source-mount — use baked image source instead
      - ./logs/server:/app/logs
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  el-frontend:
    environment:
      VITE_API_URL: http://AutoOne44.local:8000
      VITE_WS_URL: ws://AutoOne44.local:8000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  grafana:
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
