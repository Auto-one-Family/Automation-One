name: "DS18B20 Basic"
description: "OneWire Temperature Sensor (Simplest Hardware Test)"
version: "1.0"

esp:
  board: ESP32_WROOM
  device_name: "HW-Test-DS18B20"
  zone: "Test-Zone"
  subzone: "Sensor-Test"

sensors:
  - type: ds18b20
    name: "Wasser-Temperatur"
    gpio: 4
    interface: ONEWIRE
    sample_interval_ms: 30000
    operating_mode: continuous

actuators: []

stability_test:
  duration_minutes: 30
  polling_interval_minutes: 5
  expected_ranges:
    ds18b20:
      min: 5.0
      max: 45.0
      unit: "°C"
