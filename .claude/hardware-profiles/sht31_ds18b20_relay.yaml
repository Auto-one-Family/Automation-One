name: "SHT31 + DS18B20 + Relay"
description: "I2C + OneWire + Digital Actuator (Multi-Interface E2E Test)"
version: "1.0"

esp:
  board: ESP32_WROOM
  device_name: "HW-Test-Combo"
  zone: "Test-Zone"
  subzone: "E2E-Test"

sensors:
  - type: ds18b20
    name: "Wasser-Temperatur"
    gpio: 4
    interface: ONEWIRE
    sample_interval_ms: 30000
    operating_mode: continuous

  - type: sht31
    name: "Luft-Klima"
    gpio: 21
    interface: I2C
    i2c_address: "0x44"
    sample_interval_ms: 30000
    operating_mode: continuous

actuators:
  - type: relay
    name: "Bewaesserung"
    gpio: 16
    inverted_logic: false

stability_test:
  duration_minutes: 30
  polling_interval_minutes: 5
  expected_ranges:
    ds18b20:
      min: 5.0
      max: 45.0
      unit: "°C"
    sht31_temp:
      min: 10.0
      max: 50.0
      unit: "°C"
    sht31_humidity:
      min: 20.0
      max: 95.0
      unit: "% RH"
