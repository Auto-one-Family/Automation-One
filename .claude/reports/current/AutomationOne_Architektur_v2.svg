    <text x="12" y="36" font-size="8.4" fill="#4B5563">COLD_START -> WARMING_UP -> NORMAL_OPERATION -> DEGRADED_OPERATION -> RECOVERY_SYNC -> SHUTDOWN_DRAIN</text>
    <text x="12" y="55" font-size="8.4" fill="#4B5563">Offene Risiken (bekannt): Inbound Drop bei DB-down, unvollstaendiger intent_outcome-Pfad, ACK-Fallback bei Parallelitaet.</text>
    <text x="12" y="72" font-size="8.4" fill="#4B5563">Strategie: degrade-first, keine implizite Erfolgsmeldung ohne bestaetigte Endausfuehrung.</text>
  </g>

