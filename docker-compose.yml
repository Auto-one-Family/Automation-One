# AutomationOne - Docker Compose Development Stack
# ==============================================
# Startet alle Services für lokale Entwicklung:
# - el-servador: FastAPI Backend
# - el-frontend: Vue 3 Dashboard
# - postgres: PostgreSQL Database
# - mqtt-broker: Eclipse Mosquitto
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f        # Follow logs
#   docker-compose down           # Stop all services
#   docker-compose down -v        # Stop and remove volumes

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: automationone-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./logs/postgres:/var/log/postgresql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automationone-net
    restart: unless-stopped

  # ============================================
  # Eclipse Mosquitto MQTT Broker
  # ============================================
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: automationone-mqtt
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - ./logs/mqtt:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - automationone-net
    restart: unless-stopped

  # ============================================
  # God-Kaiser Server (FastAPI Backend)
  # ============================================
  el-servador:
    build:
      context: ./El Servador
      dockerfile: Dockerfile
    container_name: automationone-server
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_AUTO_INIT: "true"
      # MQTT
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: "1883"
      MQTT_WEBSOCKET_PORT: "9001"
      # Server
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      SERVER_RELOAD: "true"
      # Security (CHANGE IN PRODUCTION!)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      # Environment
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS (allow frontend)
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    ports:
      - "8000:8000"
    volumes:
      # Live-reload: Mount source code
      - ./El Servador/god_kaiser_server/src:/app/src:ro
      - ./logs/server:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - automationone-net
    restart: unless-stopped

  # ============================================
  # El Frontend (Vue 3 Dev Server)
  # ============================================
  el-frontend:
    build:
      context: ./El Frontend
      dockerfile: Dockerfile
    container_name: automationone-frontend
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      VITE_LOG_LEVEL: ${VITE_LOG_LEVEL:-debug}
    ports:
      - "5173:5173"
    volumes:
      # Live-reload: Mount source code (exclude node_modules)
      - ./El Frontend/src:/app/src:ro
      - ./El Frontend/public:/app/public:ro
      - ./El Frontend/index.html:/app/index.html:ro
      - ./El Frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./El Frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./El Frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./El Frontend/postcss.config.js:/app/postcss.config.js:ro
    depends_on:
      - el-servador
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - automationone-net
    restart: unless-stopped

  # ============================================
  # Loki (Log Aggregation) - Profile: monitoring
  # ============================================
  loki:
    image: grafana/loki:3.4
    container_name: automationone-loki
    profiles: ["monitoring"]
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - automationone-loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - automationone-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================
  # Promtail (Log Shipping) - Profile: monitoring
  # ============================================
  promtail:
    image: grafana/promtail:3.4
    container_name: automationone-promtail
    profiles: ["monitoring"]
    volumes:
      - ./docker/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - automationone-promtail-positions:/promtail-positions
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9080' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - automationone-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================
  # Prometheus (Metrics Collection) - Profile: monitoring
  # ============================================
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: automationone-prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - automationone-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    depends_on:
      el-servador:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - automationone-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================
  # Grafana (Dashboards) - Profile: monitoring
  # ============================================
  grafana:
    image: grafana/grafana:11.5.2
    container_name: automationone-grafana
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - automationone-grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - automationone-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    name: automationone-postgres-data
  mosquitto_data:
    name: automationone-mosquitto-data
  automationone-loki-data:
  automationone-prometheus-data:
  automationone-grafana-data:
  automationone-promtail-positions:

# ============================================
# Network
# ============================================
networks:
  automationone-net:
    name: automationone-net
    driver: bridge
