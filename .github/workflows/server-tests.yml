name: Server Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main, master, develop]
    paths:
      - 'El Servador/**'
      - '.github/workflows/server-tests.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'El Servador/**'

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.7.1'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            El Servador/god_kaiser_server/.venv
            ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('El Servador/god_kaiser_server/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        working-directory: El Servador/god_kaiser_server
        run: poetry install --no-root --no-interaction

      - name: Run Ruff (Linter)
        working-directory: El Servador/god_kaiser_server
        run: poetry run ruff check src/ tests/ --output-format=github

      - name: Run Black (Format Check)
        working-directory: El Servador/god_kaiser_server
        run: poetry run black --check src/ tests/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            El Servador/god_kaiser_server/.venv
            ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('El Servador/god_kaiser_server/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        working-directory: El Servador/god_kaiser_server
        run: poetry install --no-root --no-interaction

      - name: Run Unit Tests
        working-directory: El Servador/god_kaiser_server
        run: |
          poetry run pytest tests/unit/ \
            -v \
            --tb=short \
            --junitxml=junit-unit.xml \
            --cov=src \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            El Servador/god_kaiser_server/junit-unit.xml
            El Servador/god_kaiser_server/coverage-unit.xml
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Mosquitto MQTT broker
        run: |
          # Start Mosquitto with CI config (allows anonymous, listens on 0.0.0.0)
          # NOTE: Cannot use GitHub Actions 'services:' because Mosquitto 2.x
          # requires a config file to allow anonymous connections, and services
          # start before checkout (so we can't mount the repo config file).
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -v "${{ github.workspace }}/.github/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2

          echo "Waiting for Mosquitto to accept connections..."
          for i in $(seq 1 30); do
            if docker exec mosquitto mosquitto_pub -h localhost -t healthcheck -m ok 2>/dev/null; then
              echo "✅ Mosquitto ready (attempt $i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Mosquitto not ready after 30 attempts"
              docker logs mosquitto
              exit 1
            fi
            sleep 1
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            El Servador/god_kaiser_server/.venv
            ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('El Servador/god_kaiser_server/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        working-directory: El Servador/god_kaiser_server
        run: poetry install --no-root --no-interaction

      - name: Run Integration Tests
        working-directory: El Servador/god_kaiser_server
        env:
          MQTT_BROKER_HOST: localhost
          MQTT_BROKER_PORT: 1883
          DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: |
          poetry run pytest tests/integration/ \
            -v \
            --tb=short \
            --junitxml=junit-integration.xml \
            --cov=src \
            --cov-report=xml:coverage-integration.xml

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            El Servador/god_kaiser_server/junit-integration.xml
            El Servador/god_kaiser_server/coverage-integration.xml
          retention-days: 7

      - name: Stop Mosquitto
        if: always()
        run: docker rm -f mosquitto || true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-tests, integration-tests]
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-test-results'
          merge-multiple: true

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          find . -name "*.xml" -type f 2>/dev/null || echo "No XML files found"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/junit-*.xml
          check_name: Test Results
          comment_mode: always
