                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/subzone/assign" \
                  -m '{"subzone_id":"subzone_beta","gpios":[4]}'
                ;;
              gpio_subzone_pins)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":4,"sensor_type":"temp_ds18b20","sensor_name":"ClimateTemp","active":true}],"actuators":[{"gpio":5,"actuator_type":"fan","actuator_name":"ClimateFan","active":true},{"gpio":14,"actuator_type":"valve","actuator_name":"ClimateVent","active":true}]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/subzone/assign" \
                  -m '{"subzone_id":"climate_control","gpios":[4,5,14]}'
                ;;
              gpio_subzone_safe)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":5,"actuator_type":"pump","actuator_name":"IrrigationPump","active":true},{"gpio":14,"actuator_type":"valve","actuator_name":"IrrigationValve","active":true},{"gpio":15,"actuator_type":"fan","actuator_name":"VentilationFan","active":true},{"gpio":16,"actuator_type":"relay","actuator_name":"VentilationDamper","active":true}]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/subzone/assign" \
                  -m '{"subzone_id":"irrigation","gpios":[5,14]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/subzone/assign" \
                  -m '{"subzone_id":"ventilation","gpios":[15,16]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/actuator/5/command" \
                  -m '{"command":"ON"}'
                sleep 0.1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/actuator/14/command" \
                  -m '{"command":"ON"}'
                sleep 0.1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/actuator/15/command" \
                  -m '{"command":"ON"}'
                sleep 0.1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/actuator/16/command" \
                  -m '{"command":"ON"}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/subzone/safe" \
                  -m '{"subzone_id":"irrigation","enable":true}'
                ;;
              *)
                # Passive scenarios (gpio_boot_i2c_auto, gpio_boot_pin_count): no MQTT injection needed
                ;;
            esac
          }

          for scenario in tests/wokwi/scenarios/gpio/*.yaml; do
            name=$(basename "$scenario" .yaml)

            # Skip core tests
            if echo "$CORE_TESTS" | grep -qw "$name"; then
              echo "SKIP (core): $name"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "=== Running: $name ==="

            # Start Wokwi in background, log to file
            timeout 120 wokwi-cli . --timeout 90000 --scenario "$scenario" > "${name}.log" 2>&1 &
            WOKWI_PID=$!

            # Wait for MQTT connection (up to 60s) before injecting
            for i in {1..60}; do
              grep -q "MQTT connected successfully" "${name}.log" 2>/dev/null && break
              sleep 1
            done

            # Inject scenario-specific MQTT messages
            inject_mqtt_for_gpio_scenario "$name"

            # Wait for Wokwi to complete, capture exit code
            if wait $WOKWI_PID; then
              echo "PASS: $name"
              PASSED=$((PASSED + 1))
            else
              echo "FAIL: $name (exit $?)"
              tail -10 "${name}.log" || true
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== GPIO Extended Results: $PASSED passed, $FAILED failed, $SKIPPED skipped ==="
          [ $FAILED -eq 0 ]

      - name: Stop Mosquitto
        if: always()
        run: docker stop mosquitto && docker rm mosquitto || true

      - name: Upload GPIO Extended Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-gpio-extended-logs
          path: El Trabajante/gpio_*.log
          retention-days: 7

  # --- Nightly: Dynamic Sensor Tests (13 new set-control sweep scenarios) ---
  nightly-sensor-dynamic:
    runs-on: ubuntu-latest
    needs: build-firmware
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Firmware
        uses: actions/download-artifact@v4
        with:
          name: wokwi-firmware
          path: El Trabajante/.pio/build/wokwi_simulation/

      - name: Start Mosquitto MQTT Broker
        run: |
          bash scripts/wokwi/ci_mqtt_contract.sh start-broker --job "$GITHUB_JOB" --timeout-seconds 30
      - name: Install Wokwi CLI
        run: |
          curl -L https://wokwi.com/ci/install.sh | sh -s "$WOKWI_CLI_VERSION"
          echo "$HOME/.wokwi/bin" >> $GITHUB_PATH

      - name: Run Dynamic Sensor Sweep Tests
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"

          # Skip scenarios already in core PR sensor jobs
          CORE_TESTS="sensor_heartbeat sensor_ds18b20_read sensor_ds18b20_full_flow sensor_dht22_full_flow sensor_analog_flow"
          PASSED=0
          FAILED=0
          SKIPPED=0

          for scenario in tests/wokwi/scenarios/02-sensor/*.yaml; do
            name=$(basename "$scenario" .yaml)

            # Skip core tests
            if echo "$CORE_TESTS" | grep -qw "$name"; then
              echo "SKIP (core): $name"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "=== Running: $name ==="
            if timeout 120 wokwi-cli . --timeout 90000 --scenario "$scenario" 2>&1 | tee "${name}.log"; then
              echo "PASS: $name"
              PASSED=$((PASSED + 1))
            else
              echo "FAIL: $name (exit $?)"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== Dynamic Sensor Results: $PASSED passed, $FAILED failed, $SKIPPED skipped ==="

      - name: Stop Mosquitto
        if: always()
        run: docker stop mosquitto && docker rm mosquitto || true

      - name: Upload Dynamic Sensor Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-sensor-dynamic-logs
          path: El Trabajante/sensor_*.log
          retention-days: 7

  # ============================================
  # JOB 24: Test Summary
  # ============================================
  test-summary:
    runs-on: ubuntu-latest
    needs: [boot-tests, sensor-tests, mqtt-connection-test, actuator-tests, zone-tests, emergency-tests, config-tests, sensor-flow-tests, actuator-flow-tests, combined-flow-tests, gpio-core-tests, i2c-core-tests, nvs-core-tests, pwm-core-tests, error-injection-tests]
    if: always()

    steps:
      - name: Download All Logs
        uses: actions/download-artifact@v4
        with:
          pattern: '*-test-logs'
          merge-multiple: true
          path: all-logs

      - name: Generate Test Summary
        run: |
          echo "# Wokwi ESP32 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          # Check each test
          if [ -f all-logs/boot_full.log ]; then
            if grep -q "Phase 5: Actuator System READY" all-logs/boot_full.log; then
              echo "| Boot Full | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Boot Full | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Boot Full | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f all-logs/boot_safe_mode.log ]; then
            if grep -q "GPIO SAFE-MODE INITIALIZATION" all-logs/boot_safe_mode.log; then
              echo "| Safe-Mode | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Safe-Mode | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Safe-Mode | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f all-logs/sensor_heartbeat.log ]; then
            if grep -q "heartbeat" all-logs/sensor_heartbeat.log; then
              echo "| Heartbeat | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Heartbeat | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Heartbeat | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f all-logs/wokwi_mqtt_output.log ]; then
            if grep -q "MQTT connected successfully" all-logs/wokwi_mqtt_output.log; then
              echo "| MQTT Connection | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| MQTT Connection | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| MQTT Connection | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
          fi

          # Actuator tests
          for test_file in actuator_led_on:Actuator:LED_ON actuator_pwm:PWM:PWM actuator_status:actuator:Status_Publish actuator_emergency_clear:EMERGENCY:Emergency_Clear; do
            IFS=: read -r file pattern label <<< "$test_file"
            if [ -f "all-logs/${file}.log" ]; then
              if grep -qi "$pattern" "all-logs/${file}.log"; then
                echo "| $label | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $label | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $label | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Zone tests
          for test_file in zone_assignment:"ZONE ASSIGNMENT RECEIVED":Zone_Assignment subzone_assignment:SUBZONE:Subzone_Assignment; do
            IFS=: read -r file pattern label <<< "$test_file"
            if [ -f "all-logs/${file}.log" ]; then
              if grep -q "$pattern" "all-logs/${file}.log"; then
                echo "| $label | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $label | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $label | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Emergency tests
          for test_file in emergency_broadcast:"BROADCAST EMERGENCY-STOP RECEIVED":Emergency_Broadcast emergency_esp_stop:"AUTHORIZED EMERGENCY-STOP TRIGGERED":ESP_Emergency_Stop; do
            IFS=: read -r file pattern label <<< "$test_file"
            if [ -f "all-logs/${file}.log" ]; then
              if grep -q "$pattern" "all-logs/${file}.log"; then
                echo "| $label | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $label | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $label | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Config tests
          for test_file in config_sensor:config:Sensor_Config config_actuator:config:Actuator_Config; do
            IFS=: read -r file pattern label <<< "$test_file"
            if [ -f "all-logs/${file}.log" ]; then
              if grep -qi "$pattern" "all-logs/${file}.log"; then
                echo "| $label | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $label | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $label | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # E2E Sensor Flow tests
          for test_file in sensor_ds18b20_full_flow:Published:DS18B20_Full_Flow sensor_dht22_full_flow:Published:DHT22_Full_Flow sensor_analog_flow:Published:Analog_Flow; do
            IFS=: read -r file pattern label <<< "$test_file"
            if [ -f "all-logs/${file}.log" ]; then
              if grep -qi "$pattern" "all-logs/${file}.log"; then
                echo "| $label | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $label | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $label | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # E2E Actuator Flow tests
          for test_file in actuator_binary_full_flow:Actuator:Binary_Full_Flow actuator_pwm_full_flow:Actuator:PWM_Full_Flow actuator_timeout_flow:timeout:Timeout_E2E; do
            IFS=: read -r file pattern label <<< "$test_file"
            if [ -f "all-logs/${file}.log" ]; then
              if grep -qi "$pattern" "all-logs/${file}.log"; then
                echo "| $label | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $label | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $label | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # E2E Combined Flow tests
          for test_file in combined_sensor_actuator:Actuator:Combined_Sensor_Actuator emergency_stop_full_flow:"BROADCAST EMERGENCY-STOP":Emergency_Full_Flow multi_device_parallel:Actuator:Multi_Device_Parallel; do
            IFS=: read -r file pattern label <<< "$test_file"
            if [ -f "all-logs/${file}.log" ]; then
              if grep -q "$pattern" "all-logs/${file}.log"; then
                echo "| $label | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $label | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $label | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Error-Injection tests
          for test_file in error_sensor_timeout:SENSOR_READ_FAILED:EI_Sensor_Timeout error_mqtt_disconnect:heartbeat:EI_MQTT_Disconnect error_gpio_conflict:conflict:EI_GPIO_Conflict error_watchdog_trigger:heartbeat:EI_Watchdog error_config_invalid_json:JSON_PARSE_ERROR:EI_Invalid_JSON error_actuator_timeout:timeout:EI_Actuator_Timeout error_emergency_cascade:EMERGENCY-STOP:EI_Emergency_Cascade error_i2c_bus_stuck:I2C:EI_I2C_Bus_Stuck error_nvs_corrupt:NVS:EI_NVS_Corrupt error_heap_pressure:heartbeat:EI_Heap_Pressure; do
            IFS=: read -r file pattern label <<< "$test_file"
            if [ -f "all-logs/${file}.log" ]; then
              if grep -qi "$pattern" "all-logs/${file}.log"; then
                echo "| $label | :white_check_mark: PASS |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $label | :x: FAIL |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $label | :warning: NO LOG |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Scenarios | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Boot & Core | 2 | 100% |" >> $GITHUB_STEP_SUMMARY
          echo "| Sensor & Heartbeat | 2 | 100% |" >> $GITHUB_STEP_SUMMARY
          echo "| MQTT Connection | 1 (legacy) | 100% |" >> $GITHUB_STEP_SUMMARY
          echo "| Actuator (MQTT Injection) | 4 | 100% |" >> $GITHUB_STEP_SUMMARY
          echo "| Zone (MQTT Injection) | 2 | 100% |" >> $GITHUB_STEP_SUMMARY
          echo "| Emergency (MQTT Injection) | 2 | 100% |" >> $GITHUB_STEP_SUMMARY
          echo "| Config (MQTT Injection) | 2 | 100% |" >> $GITHUB_STEP_SUMMARY
          echo "| **E2E Sensor Flows** | **3** | **100%** |" >> $GITHUB_STEP_SUMMARY
          echo "| **E2E Actuator Flows** | **3** | **100%** |" >> $GITHUB_STEP_SUMMARY
          echo "| **E2E Combined Flows** | **3** | **100%** |" >> $GITHUB_STEP_SUMMARY
          echo "| **GPIO Core** | **5** | **100%** |" >> $GITHUB_STEP_SUMMARY
          echo "| **I2C Sensor-Kommunikation** | **0 (PR Gate)** | **Hardware-only** |" >> $GITHUB_STEP_SUMMARY
          echo "| **NVS Core** | **5** | **100%** |" >> $GITHUB_STEP_SUMMARY
          echo "| **PWM Core** | **3** | **100%** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Error-Injection** | **10** | **100%** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total (PR Gate)** | **47** | **100%** |" >> $GITHUB_STEP_SUMMARY
