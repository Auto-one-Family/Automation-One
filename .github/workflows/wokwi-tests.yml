          cd "El Trabajante"
          PASS=0; FAIL=0; SKIP=0
          for scenario in tests/wokwi/scenarios/08-onewire/*.yaml; do
            name=$(basename "$scenario" .yaml)
            echo "--- Running: $name ---"
            timeout 120 wokwi-cli . --timeout 90000 \
              --scenario "$scenario" \
              2>&1 | tee "${name}.log" || true
            if grep -qi "PASS\|heartbeat\|OneWire\|success" "${name}.log" 2>/dev/null; then
