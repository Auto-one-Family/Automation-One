  # ============================================
  # JOB 15: PWM Core Tests (Phase 1: Critical)
  # ============================================
  pwm-core-tests:
    runs-on: ubuntu-latest
    needs: build-firmware
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Wokwi CLI
        run: |
          curl -L https://wokwi.com/ci/install.sh | sh -s "$WOKWI_CLI_VERSION"
          echo "$HOME/.wokwi/bin" >> $GITHUB_PATH

      - name: Download Firmware
        uses: actions/download-artifact@v4
        with:
          name: wokwi-firmware
          path: El Trabajante/.pio/build/wokwi_simulation/

      - name: Start Mosquitto MQTT Broker
        run: |
          bash scripts/wokwi/ci_mqtt_contract.sh start-broker --job "$GITHUB_JOB" --timeout-seconds 30
      - name: Run PWM Duty Percent 50 Test (MQTT Injection)
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"

          timeout 120 wokwi-cli . \
            --timeout 90000 \
            --scenario tests/wokwi/scenarios/09-pwm/pwm_duty_percent_50.yaml \
            2>&1 | tee pwm_duty_percent_50.log &
          WOKWI_PID=$!
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60

          # Configure PWM actuator on GPIO 25
          docker exec mosquitto mosquitto_pub \
            -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors":[],"actuators":[{"gpio":25,"actuator_type":"pwm","actuator_name":"TestPWM","active":true}]}'

          # Set 50% duty cycle
          docker exec mosquitto mosquitto_pub \
            -t "kaiser/god/esp/ESP_00000001/actuator/25/command" \
            -m '{"command":"SET","value":0.5}'

          wait $WOKWI_PID && echo "PWM Duty 50%: PASS" || echo "PWM Duty 50%: FAIL (exit $?)"

      - name: Run PWM Frequency Change Test
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          cd "El Trabajante"
          timeout 120 wokwi-cli . \
            --timeout 90000 \
            --scenario tests/wokwi/scenarios/09-pwm/pwm_frequency_change.yaml \
            2>&1 | tee pwm_frequency_change.log || true

      - name: Run PWM Resolution Verify Test (MQTT Injection)
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"

          timeout 120 wokwi-cli . \
            --timeout 90000 \
            --scenario tests/wokwi/scenarios/09-pwm/pwm_resolution_verify.yaml \
            2>&1 | tee pwm_resolution_verify.log &
          WOKWI_PID=$!
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60

          # Configure PWM actuator on GPIO 25
          docker exec mosquitto mosquitto_pub \
            -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors":[],"actuators":[{"gpio":25,"actuator_type":"pwm","actuator_name":"ResPWM","active":true}]}'

          # Set 50% duty cycle to verify resolution
          docker exec mosquitto mosquitto_pub \
            -t "kaiser/god/esp/ESP_00000001/actuator/25/command" \
            -m '{"command":"SET","value":0.5}'

          wait $WOKWI_PID && echo "PWM Resolution: PASS" || echo "PWM Resolution: FAIL (exit $?)"

      - name: Stop Mosquitto
        if: always()
        run: docker stop mosquitto && docker rm mosquitto || true

      - name: Upload PWM Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwm-test-logs
          path: |
            El Trabajante/pwm_*.log
          retention-days: 7

  # ============================================
  # JOB 16: Error-Injection Tests
  # ============================================
  error-injection-tests:
    runs-on: ubuntu-latest
    needs: build-firmware
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Firmware
        uses: actions/download-artifact@v4
        with:
          name: wokwi-firmware
          path: El Trabajante/.pio/build/wokwi_simulation/

      - name: Start Mosquitto MQTT Broker
        run: |
          bash scripts/wokwi/ci_mqtt_contract.sh start-broker --job "$GITHUB_JOB" --timeout-seconds 30
      - name: Install Wokwi CLI
        run: |
          curl -L https://wokwi.com/ci/install.sh | sh -s "$WOKWI_CLI_VERSION"
          echo "$HOME/.wokwi/bin" >> $GITHUB_PATH

      - name: Install mosquitto-clients
        run: sudo apt-get install -y mosquitto-clients

      # --- Scenario 1: Sensor Timeout (Ghost sensor on unconnected GPIO 32) ---
      - name: "Error Test 1: Sensor Timeout"
        continue-on-error: true
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_sensor_timeout.yaml \
            > error_sensor_timeout.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors":[{"gpio":32,"sensor_type":"ds18b20","sensor_name":"GhostSensor","active":true,"raw_mode":true}],"actuators":[]}'
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_sensor_timeout.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::Sensor Timeout: PASS" || echo "::error::Sensor Timeout: FAIL (exit $EXIT_CODE)"

      # --- Scenario 2: MQTT Activity After Config ---
      - name: "Error Test 2: MQTT Activity"
        continue-on-error: true
        if: ${{ !cancelled() }}
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_mqtt_disconnect.yaml \
            > error_mqtt_disconnect.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors":[{"gpio":4,"sensor_type":"ds18b20","sensor_name":"MQTTTestSensor","active":true}],"actuators":[]}'
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_mqtt_disconnect.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::MQTT Activity: PASS" || echo "::error::MQTT Activity: FAIL (exit $EXIT_CODE)"

      # --- Scenario 3: GPIO Conflict (two sensors on same GPIO in one config) ---
      - name: "Error Test 3: GPIO Conflict"
        continue-on-error: true
        if: ${{ !cancelled() }}
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_gpio_conflict.yaml \
            > error_gpio_conflict.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors":[{"gpio":4,"sensor_type":"ds18b20","sensor_name":"TempSensor1","active":true,"raw_mode":true},{"gpio":4,"sensor_type":"moisture","sensor_name":"MoistureSensor","active":true,"raw_mode":true}],"actuators":[]}'
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_gpio_conflict.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::GPIO Conflict: PASS" || echo "::error::GPIO Conflict: FAIL (exit $EXIT_CODE)"

      # --- Scenario 4: Watchdog Stability (heavy config + emergency cycle) ---
      - name: "Error Test 4: Watchdog Stability"
        continue-on-error: true
        if: ${{ !cancelled() }}
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_watchdog_trigger.yaml \
            > error_watchdog_trigger.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors":[{"gpio":4,"sensor_type":"ds18b20","sensor_name":"S1","active":true},{"gpio":15,"sensor_type":"dht22","sensor_name":"S2","active":true}],"actuators":[{"gpio":5,"actuator_type":"led","actuator_name":"A1","active":true}]}'
          mosquitto_pub -h localhost -t "kaiser/broadcast/emergency" \
            -m '{"auth_token":"master_token"}'
          sleep 2
          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/actuator/emergency" \
            -m '{"command":"clear_emergency","auth_token":"ESP_00000001"}'
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_watchdog_trigger.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::Watchdog Stability: PASS" || echo "::error::Watchdog Stability: FAIL (exit $EXIT_CODE)"

      # --- Scenario 5: Invalid JSON Config ---
      - name: "Error Test 5: Invalid JSON"
        continue-on-error: true
        if: ${{ !cancelled() }}
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_config_invalid_json.yaml \
            > error_config_invalid_json.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors": [{"gpio": 4, "sensor_type": "ds18b20", "broken'
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_config_invalid_json.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::Invalid JSON: PASS" || echo "::error::Invalid JSON: FAIL (exit $EXIT_CODE)"

      # --- Scenario 6: Actuator Timeout (config + actuator ON command) ---
      - name: "Error Test 6: Actuator Timeout"
        continue-on-error: true
        if: ${{ !cancelled() }}
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_actuator_timeout.yaml \
            > error_actuator_timeout.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors":[],"actuators":[{"gpio":5,"actuator_type":"led","actuator_name":"TestLED","active":true}]}'
          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/actuator/5/command" \
            -m '{"command":"ON","value":1.0}'
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_actuator_timeout.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::Actuator Timeout: PASS" || echo "::error::Actuator Timeout: FAIL (exit $EXIT_CODE)"

      # --- Scenario 7: Emergency Cascade (5 MQTT messages via helper script) ---
      - name: "Error Test 7: Emergency Cascade"
        continue-on-error: true
        if: ${{ !cancelled() }}
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_emergency_cascade.yaml \
            > error_emergency_cascade.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          chmod +x tests/wokwi/helpers/emergency_cascade.sh
          bash tests/wokwi/helpers/emergency_cascade.sh localhost
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_emergency_cascade.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::Emergency Cascade: PASS" || echo "::error::Emergency Cascade: FAIL (exit $EXIT_CODE)"

      # --- Scenario 8: I2C Bus Stuck (ghost I2C sensor) ---
      - name: "Error Test 8: I2C Bus Stuck"
        continue-on-error: true
        if: ${{ !cancelled() }}
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_i2c_bus_stuck.yaml \
            > error_i2c_bus_stuck.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors":[{"gpio":21,"sensor_type":"temperature_sht31","sensor_name":"GhostI2C","active":true,"i2c_address":68}],"actuators":[]}'
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_i2c_bus_stuck.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::I2C Bus Stuck: PASS" || echo "::error::I2C Bus Stuck: FAIL (exit $EXIT_CODE)"

      # --- Scenario 9: NVS Factory Reset ---
      - name: "Error Test 9: NVS Factory Reset"
        continue-on-error: true
        if: ${{ !cancelled() }}
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_nvs_corrupt.yaml \
            > error_nvs_corrupt.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/system/command" \
            -m '{"command":"factory_reset","confirm":true}'
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_nvs_corrupt.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::NVS Factory Reset: PASS" || echo "::error::NVS Factory Reset: FAIL (exit $EXIT_CODE)"

      # --- Scenario 10: Heap Pressure (14 devices) ---
      - name: "Error Test 10: Heap Pressure"
        continue-on-error: true
        if: ${{ !cancelled() }}
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"
          timeout 120 wokwi-cli . --timeout 90000 \
            --scenario tests/wokwi/scenarios/11-error-injection/error_heap_pressure.yaml \
            > error_heap_pressure.log 2>&1 &
          WOKWI_PID=$!

          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "MQTT connected successfully" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "REGISTRATION" --timeout-seconds 60
          python ../scripts/wokwi/wait_for_serial_readiness.py --auto-latest-log --pattern "heartbeat" --timeout-seconds 60

          mosquitto_pub -h localhost -t "kaiser/god/esp/ESP_00000001/config" \
            -m '{"sensors":[{"gpio":4,"sensor_type":"ds18b20","sensor_name":"S1","active":true},{"gpio":15,"sensor_type":"dht22","sensor_name":"S2","active":true},{"gpio":32,"sensor_type":"ds18b20","sensor_name":"S3","active":true,"raw_mode":true},{"gpio":33,"sensor_type":"moisture","sensor_name":"S4","active":true,"raw_mode":true},{"gpio":34,"sensor_type":"ds18b20","sensor_name":"S5","active":true,"raw_mode":true},{"gpio":35,"sensor_type":"moisture","sensor_name":"S6","active":true,"raw_mode":true},{"gpio":36,"sensor_type":"ds18b20","sensor_name":"S7","active":true,"raw_mode":true},{"gpio":39,"sensor_type":"moisture","sensor_name":"S8","active":true,"raw_mode":true}],"actuators":[{"gpio":5,"actuator_type":"led","actuator_name":"A1","active":true},{"gpio":25,"actuator_type":"relay","actuator_name":"A2","active":true},{"gpio":26,"actuator_type":"relay","actuator_name":"A3","active":true},{"gpio":23,"actuator_type":"led","actuator_name":"A4","active":true},{"gpio":13,"actuator_type":"led","actuator_name":"A5","active":true},{"gpio":14,"actuator_type":"led","actuator_name":"A6","active":true}]}'
          wait $WOKWI_PID && EXIT_CODE=0 || EXIT_CODE=$?
          cat error_heap_pressure.log
          [ $EXIT_CODE -eq 0 ] && echo "::notice::Heap Pressure: PASS" || echo "::error::Heap Pressure: FAIL (exit $EXIT_CODE)"

      - name: Stop Mosquitto
        if: always()
        run: docker stop mosquitto && docker rm mosquitto || true

      - name: Upload Error Injection Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-injection-test-logs
          path: El Trabajante/error_*.log
          retention-days: 7

  # ============================================
  # NIGHTLY EXTENDED TESTS (schedule + workflow_dispatch only)
  # Runs remaining 122 scenarios not covered by core PR tests
  # ============================================

  # --- Nightly: I2C Extended (15 remaining, needs I2C diagram) ---
  nightly-i2c-extended:
    runs-on: ubuntu-latest
    needs: build-firmware
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Firmware
        uses: actions/download-artifact@v4
        with:
          name: wokwi-firmware
          path: El Trabajante/.pio/build/wokwi_simulation/

      - name: Start Mosquitto MQTT Broker
        run: |
          bash scripts/wokwi/ci_mqtt_contract.sh start-broker --job "$GITHUB_JOB" --timeout-seconds 30
      - name: Setup Wokwi CLI
        run: |
          curl -L https://wokwi.com/ci/install.sh | sh -s "$WOKWI_CLI_VERSION"
          echo "$HOME/.wokwi/bin" >> $GITHUB_PATH

      - name: Use I2C Diagram (SHT31 + BME280)
        run: |
          cp "El Trabajante/tests/wokwi/diagrams/diagram_i2c.json" "El Trabajante/diagram.json"

      - name: Run All I2C Extended Tests
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"

          # Skip scenarios already in core I2C job
          CORE_TESTS="i2c_device_present i2c_device_not_present i2c_error_nack i2c_scan_devices i2c_double_init"
          PASSED=0
          FAILED=0
          SKIPPED=0

          for scenario in tests/wokwi/scenarios/08-i2c/*.yaml; do
            name=$(basename "$scenario" .yaml)

            # Skip core tests
            if echo "$CORE_TESTS" | grep -qw "$name"; then
              echo "SKIP (core): $name"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "=== Running: $name ==="
            if timeout 120 wokwi-cli . --timeout 90000 --scenario "$scenario" 2>&1 | tee "${name}.log"; then
              echo "PASS: $name"
              PASSED=$((PASSED + 1))
            else
              echo "FAIL: $name (exit $?)"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== I2C Extended Results: $PASSED passed, $FAILED failed, $SKIPPED skipped ==="

      - name: Restore Default Diagram
        if: always()
        run: git checkout "El Trabajante/diagram.json"

      - name: Stop Mosquitto
        if: always()
        run: docker stop mosquitto && docker rm mosquitto || true

      - name: Upload I2C Extended Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-i2c-extended-logs
          path: El Trabajante/i2c_*.log
          retention-days: 7

