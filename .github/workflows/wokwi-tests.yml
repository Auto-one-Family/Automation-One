      - name: Run All OneWire Tests
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"

          PASSED=0
          FAILED=0

          for scenario in tests/wokwi/scenarios/08-onewire/*.yaml; do
            name=$(basename "$scenario" .yaml)
            echo "=== Running: $name ==="
            if timeout 120 wokwi-cli . --timeout 90000 --scenario "$scenario" 2>&1 | tee "${name}.log"; then
              echo "PASS: $name"
              PASSED=$((PASSED + 1))
            else
              echo "FAIL: $name (exit $?)"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== OneWire Results: $PASSED passed, $FAILED failed out of 29 ==="

      - name: Stop Mosquitto
        if: always()
        run: docker stop mosquitto && docker rm mosquitto || true

      - name: Upload OneWire Logs
        if: always()
