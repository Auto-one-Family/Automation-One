        uses: actions/download-artifact@v4
        with:
          name: wokwi-firmware
          path: El Trabajante/.pio/build/wokwi_simulation/

      - name: Start Mosquitto MQTT Broker
        run: |
          bash scripts/wokwi/ci_mqtt_contract.sh start-broker --job "$GITHUB_JOB" --timeout-seconds 30
      - name: Setup Wokwi CLI
        run: |
          curl -L https://wokwi.com/ci/install.sh | sh -s "$WOKWI_CLI_VERSION"
          echo "$HOME/.wokwi/bin" >> $GITHUB_PATH

      - name: Run All Hardware Tests
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          export PATH="$HOME/.wokwi/bin:$PATH"
          cd "El Trabajante"

          PASSED=0
          FAILED=0

          # MQTT injection per hardware scenario (called after "MQTT connected" detected in log)
          inject_mqtt_for_hw_scenario() {
            local name="$1"
            case "$name" in
              hw_actuator_limit)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":5,"actuator_type":"led","actuator_name":"LED1","active":true},{"gpio":14,"actuator_type":"relay","actuator_name":"Relay1","active":true},{"gpio":15,"actuator_type":"pump","actuator_name":"Pump1","active":true},{"gpio":16,"actuator_type":"relay","actuator_name":"Relay2","active":true}]}'
                sleep 2
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":17,"actuator_type":"relay","actuator_name":"Relay3","active":true},{"gpio":18,"actuator_type":"led","actuator_name":"LED2","active":true},{"gpio":19,"actuator_type":"led","actuator_name":"LED3","active":true},{"gpio":23,"actuator_type":"relay","actuator_name":"Relay4","active":true}]}'
                ;;
              hw_cross_board_constants)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":32,"sensor_type":"analog","sensor_name":"WROOMOnlySensor","active":true}]}'
                sleep 2
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":33,"actuator_type":"relay","actuator_name":"WROOMOnlyRelay","active":true}]}'
                ;;
              hw_i2c_config)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":21,"sensor_type":"analog","sensor_name":"ConflictSensor","active":true}]}'
                ;;
              hw_input_only_reject)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":34,"actuator_type":"relay","actuator_name":"InvalidRelay34","active":true}]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":39,"actuator_type":"pump","actuator_name":"InvalidPump39","active":true}]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":34,"sensor_type":"analog","sensor_name":"AnalogSensor34","active":true}]}'
                ;;
              hw_pwm_config)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":5,"actuator_type":"led","actuator_name":"PWM_LED","active":true,"pwm_enabled":true}]}'
                sleep 2
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/actuator/5/command" \
                  -m '{"command":"PWM","value":0.5}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/actuator/5/command" \
                  -m '{"command":"PWM","value":1.0}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/actuator/5/command" \
                  -m '{"command":"OFF","value":0}'
                ;;
              hw_reserved_pins)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":0,"sensor_type":"digital_input","sensor_name":"BootPinSensor","active":true}]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":1,"actuator_type":"relay","actuator_name":"UARTRelay","active":true}]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":3,"sensor_type":"analog","sensor_name":"RXSensor","active":true}]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":12,"actuator_type":"pump","actuator_name":"FlashPump","active":true}]}'
                sleep 1
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":6,"sensor_type":"digital_input","sensor_name":"FlashSensor","active":true}]}'
                ;;
              hw_safe_pins_verify)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":4,"sensor_type":"temp_ds18b20","sensor_name":"ValidSensor","active":true}]}'
                sleep 2
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"actuators":[{"gpio":5,"actuator_type":"led","actuator_name":"ValidLED","active":true}]}'
                ;;
              hw_sensor_limit)
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":4,"sensor_type":"temp_ds18b20","sensor_name":"Sensor1","active":true},{"gpio":5,"sensor_type":"analog","sensor_name":"Sensor2","active":true},{"gpio":14,"sensor_type":"analog","sensor_name":"Sensor3","active":true},{"gpio":15,"sensor_type":"analog","sensor_name":"Sensor4","active":true},{"gpio":16,"sensor_type":"analog","sensor_name":"Sensor5","active":true}]}'
                sleep 2
                docker exec mosquitto mosquitto_pub -h localhost \
                  -t "kaiser/god/esp/ESP_00000001/config" \
                  -m '{"sensors":[{"gpio":17,"sensor_type":"analog","sensor_name":"Sensor6","active":true},{"gpio":18,"sensor_type":"analog","sensor_name":"Sensor7","active":true},{"gpio":19,"sensor_type":"analog","sensor_name":"Sensor8","active":true},{"gpio":23,"sensor_type":"analog","sensor_name":"Sensor9","active":true},{"gpio":25,"sensor_type":"analog","sensor_name":"Sensor10","active":true}]}'
                ;;
              *)
                # Passive scenario (hw_board_type): no MQTT injection needed
                ;;
            esac
          }

          for scenario in tests/wokwi/scenarios/09-hardware/*.yaml; do
            name=$(basename "$scenario" .yaml)
            echo "=== Running: $name ==="

            # Start Wokwi in background, log to file
            timeout 120 wokwi-cli . --timeout 90000 --scenario "$scenario" > "${name}.log" 2>&1 &
            WOKWI_PID=$!

            # Wait for MQTT connection (up to 60s) before injecting
            for i in {1..60}; do
              grep -q "MQTT connected successfully" "${name}.log" 2>/dev/null && break
              sleep 1
            done

            # Inject scenario-specific MQTT messages
            inject_mqtt_for_hw_scenario "$name"

            # Wait for Wokwi to complete, capture exit code
            if wait $WOKWI_PID; then
              echo "PASS: $name"
              PASSED=$((PASSED + 1))
            else
              echo "FAIL: $name (exit $?)"
              tail -10 "${name}.log" || true
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== Hardware Results: $PASSED passed, $FAILED failed out of 9 ==="
          [ $FAILED -eq 0 ]

      - name: Stop Mosquitto
        if: always()
        run: docker stop mosquitto && docker rm mosquitto || true

      - name: Upload Hardware Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-hardware-logs
          path: El Trabajante/hw_*.log
          retention-days: 7

