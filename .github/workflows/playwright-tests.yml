name: Playwright E2E Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main, master, develop]
    paths:
      - 'El Frontend/**'
      - 'El Servador/**'
      - 'docker-compose.e2e.yml'
      - '.github/workflows/playwright-tests.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'El Frontend/**'
      - 'El Servador/**'
      - 'docker-compose.e2e.yml'

env:
  NODE_VERSION: '20'

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'El Frontend/package-lock.json'

      - name: Install dependencies
        working-directory: El Frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: El Frontend
        run: npx playwright install chromium --with-deps

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-playwright-${{ hashFiles('**/Dockerfile', '**/package-lock.json', '**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-docker-playwright-
            ${{ runner.os }}-docker-

      - name: Create shared-infra network (if not exists)
        run: docker network create shared-infra-net || true

      - name: Start E2E stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --build --wait
          echo "Waiting for services to be healthy..."
          sleep 10
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
          # Required by base docker-compose.yml which uses ${VAR} syntax
          POSTGRES_USER: god_kaiser
          POSTGRES_PASSWORD: e2e_test_password
          POSTGRES_DB: god_kaiser_db
          JWT_SECRET_KEY: e2e_test_secret_key_not_for_production

      - name: Verify services
        run: |
          echo "Checking Server health..."
          max_attempts=30
          for i in $(seq 1 $max_attempts); do
            if ! docker ps --filter "name=automationone-server" --filter "status=running" -q | grep -q .; then
              echo "❌ Server container exited! Logs:"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs el-servador --tail 100 || true
              exit 1
            fi
            if curl -sf http://localhost:8000/api/v1/health/live > /dev/null 2>&1; then
              echo "✅ Server healthy after ${i} attempts"
              break
            fi
            if [ $i -eq $max_attempts ]; then
              echo "❌ Server not healthy after ${max_attempts} attempts"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs el-servador --tail 100 || true
              exit 1
            fi
            sleep 2
          done

          echo "Checking Frontend..."
          curl -f http://localhost:5173 || exit 1

          echo "Checking MQTT broker..."
          docker exec automationone-mqtt mosquitto_pub -h localhost -t test -m ping || exit 1

          echo "All services healthy!"

      - name: Create log directories
        run: mkdir -p logs/frontend/playwright

      - name: Run Playwright tests
        working-directory: El Frontend
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          CI: true
          # CI-only test credentials - not real secrets, safe to commit
          E2E_TEST_USER: admin
          E2E_TEST_PASSWORD: Admin123#

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            logs/frontend/playwright/playwright-report/
            logs/frontend/playwright/test-results/
          retention-days: 7

      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: logs/frontend/playwright/test-results/**/*.zip
          retention-days: 7

      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "=== Server Logs ==="
          docker logs automationone-server --tail 100 2>&1 || true

          echo "=== Frontend Logs ==="
          docker logs automationone-frontend --tail 50 2>&1 || true

          echo "=== MQTT Logs ==="
          docker logs automationone-mqtt --tail 50 2>&1 || true

      - name: Stop E2E stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
        env:
          POSTGRES_USER: god_kaiser
          POSTGRES_PASSWORD: e2e_test_password
          POSTGRES_DB: god_kaiser_db
          JWT_SECRET_KEY: e2e_test_secret_key_not_for_production
